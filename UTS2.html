    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 50px;
            background-color: #ee083e;
        }

        .container {
            display: flex;
            background: rgb(241, 238, 244);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            align-items: center;
        }

        /* Bagian Foto */
        .foto-container {
            width: 150px;
            height: 200px;
            background-color: #efebf3; 
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-right: 25px;
            overflow: hidden;
        }

        .foto-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Styling Tabel */
        table {
            border-collapse: collapse;
            width: 300px;
        }

        table tr td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        .label {
            font-weight: bold;
            color: #333;
            width: 80px;
        }
    </style>
</head>
